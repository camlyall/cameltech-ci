name: reusable-deploy
on:
  workflow_call:
    inputs:
      deploy_kind: { type: string, required: true }     # pages | worker
      project_name: { type: string, required: true }
      environment: { type: string, required: true }     # dev | prod
      site_url: { type: string, required: true }
      build_command: { type: string, default: "npm run build" }
      wrangler_config: { type: string, default: "" }
    secrets:
      CLOUDFLARE_API_TOKEN: { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SITE_URL: ${{ inputs.site_url }}
      PROJECT_NAME: ${{ inputs.project_name }}
      BUILD_COMMAND: ${{ inputs.build_command }}
      WRANGLER_CONFIG: ${{ inputs.wrangler_config }}
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        uses: actions/checkout@v4
        with:
          repository: camlyall/cameltech-ci
          ref: v1
          path: .cameltech-ci
      - run: cat .cameltech-ci/configs/tool-versions.env >> "$GITHUB_ENV"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Swap wrangler config (worker, optional)
        if: inputs.deploy_kind == 'worker' && inputs.wrangler_config != ''
        run: cp "$WRANGLER_CONFIG" wrangler.toml
      - name: Build
        run: $BUILD_COMMAND
      - name: Deploy (Pages)
        if: inputs.deploy_kind == 'pages'
        run: npx wrangler@${WRANGLER_VERSION} pages deploy dist --project-name="$PROJECT_NAME" --commit-dirty=true
      - name: Deploy (Worker)
        if: inputs.deploy_kind == 'worker'
        run: npx wrangler@${WRANGLER_VERSION} deploy --config dist/server/wrangler.json
