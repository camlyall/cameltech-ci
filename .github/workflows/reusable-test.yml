name: reusable-test
on:
  workflow_call:
    inputs:
      language:
        type: string
        default: astro
      test_mode:
        type: string
        default: none
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          path: target
      - name: Checkout cameltech-ci engine
        uses: actions/checkout@v6
        with:
          repository: camlyall/cameltech-ci
          ref: v1
          path: cameltech-ci
      - name: Load pinned tool versions
        id: tools
        run: cat cameltech-ci/configs/tool-versions.env >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.tools.outputs.NODE_VERSION }}
          cache: npm
          cache-dependency-path: target/package-lock.json
      - name: Install caller deps
        working-directory: target
        run: npm ci
      - name: Test (mode from caller input)
        env:
          CI_ROOT: ${{ github.workspace }}/cameltech-ci
          LANGUAGE: ${{ inputs.language }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: |
          bash cameltech-ci/scripts/test-entry.sh \
            "$LANGUAGE" "$GITHUB_WORKSPACE/target" "$TEST_MODE"
